# Crow — agent coordination system
# Infrastructure config for scaffold (https://github.com/erdoai/scaffold)
# Keys defined in scaffold.config.yml, stored in .scaffold/.env

project: crow
region: us-west1

services:
  server:
    provider: railway
    runtime: python
    source: .
    start: "crow serve"
    health_check: /healthz
    env:
      CROW_DATABASE_URL: "${{postgres.url}}"
      CROW_ANTHROPIC_API_KEY: "${{env.ANTHROPIC_API_KEY}}"
      CROW_WORKER_API_KEY: "${{env.WORKER_API_KEY}}"
      CROW_DEVBOT_URL: "${{env.DEVBOT_URL}}"
      CROW_PILOT_URL: "${{env.PILOT_URL}}"
      CROW_PORT: "8100"
      CROW_IMESSAGE_ENABLED: "false"
      SESSION_SECRET: "${{env.SESSION_SECRET}}"
      RESEND_API_KEY: "${{env.RESEND_API_KEY}}"
      JINA_API_KEY: "${{env.JINA_API_KEY}}"
      BROWSERUSE_API_KEY: "${{env.BROWSERUSE_API_KEY}}"
      DEVBOT_API_KEY: "${{env.DEVBOT_API_KEY}}"
      CROW_CONFIG: "${{file:crow.yml}}"

  worker:
    provider: railway
    runtime: python
    source: .
    start: "crow worker --url http://server.railway.internal:8100"
    replicas: 1
    env:
      CROW_DATABASE_URL: "${{postgres.url}}"
      CROW_ANTHROPIC_API_KEY: "${{env.ANTHROPIC_API_KEY}}"
      CROW_WORKER_API_KEY: "${{env.WORKER_API_KEY}}"
      CROW_DEVBOT_URL: "${{env.DEVBOT_URL}}"
      CROW_PILOT_URL: "${{env.PILOT_URL}}"

databases:
  postgres:
    provider: railway
    plugin: postgres
    extensions: [pgvector]

domain:
  server:
    host: api.crow.erdo.ai
